name: checks

on:
  push:
  pull_request:

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - run: python3 public_repo_guard.py --self-test
      - run: python3 public_repo_guard.py .
      - run: python3 -m py_compile public_repo_guard.py
